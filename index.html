<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Daily"/>
<meta name="theme-color" content="#0D0F14"/>
<title>Daily Management</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
body{background:#0D0F14;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;color:#EEF0F6;overscroll-behavior:none;-webkit-user-select:none;}
input,textarea,select{-webkit-appearance:none;font-family:inherit;font-size:15px;}
::-webkit-scrollbar{display:none;}
textarea{resize:none;}
button{cursor:pointer;font-family:inherit;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideDown{from{transform:translateY(-110%)}to{transform:translateY(0)}}
@keyframes toastPop{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.screen{min-height:100vh;padding-bottom:90px;}
.header{padding:52px 20px 24px;position:relative;overflow:hidden;background:linear-gradient(160deg,#0D1520,#111827);border-bottom:1px solid #252D3F;}
.header.light{background:linear-gradient(160deg,#3A7BD5,#5E5CE6);}
.blob{position:absolute;border-radius:50%;filter:blur(60px);pointer-events:none;}
.card{background:#161B25;border-radius:18px;padding:14px 16px;margin-bottom:10px;border:1px solid #252D3F;}
.card.light{background:#fff;border-color:#DDE3F0;}
.nav{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;padding:10px 0;padding-bottom:calc(10px + env(safe-area-inset-bottom));background:rgba(13,15,20,.96);border-top:1px solid #252D3F;z-index:100;backdrop-filter:blur(20px);}
.nav.light{background:rgba(248,250,255,.96);border-top-color:#DDE3F0;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:2px 14px;cursor:pointer;position:relative;}
.nav-icon{width:42px;height:42px;border-radius:14px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.nav-label{font-size:10px;font-weight:700;}
.fab{position:fixed;bottom:90px;right:18px;width:54px;height:54px;border-radius:20px;border:none;display:flex;align-items:center;justify-content:center;z-index:200;box-shadow:0 6px 24px rgba(244,197,66,.4);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;display:flex;align-items:flex-end;animation:fadeIn .2s ease;}
.sheet{background:#161B25;border-radius:24px 24px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:0 0 44px;border:1px solid #252D3F;border-bottom:none;animation:slideUp .3s ease;}
.sheet.light{background:#fff;border-color:#DDE3F0;}
.handle{width:40px;height:4px;background:#252D3F;border-radius:99px;margin:14px auto 20px;}
.sheet-body{padding:0 20px;}
.input{width:100%;background:#1C2333;border:1.5px solid #252D3F;border-radius:12px;padding:12px 14px;color:#EEF0F6;outline:none;display:block;}
.input.light{background:#F0F4FF;border-color:#DDE3F0;color:#1A1D2E;}
.label{font-size:11px;font-weight:700;color:#7A849A;margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.8px;}
.btn{width:100%;border-radius:14px;padding:13px 20px;font-size:15px;font-weight:800;border:none;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-primary{background:linear-gradient(135deg,#F4C542,#E8943A);color:#000;}
.btn-ghost{background:transparent;color:#F4C542;border:1.5px solid rgba(244,197,66,.4);}
.btn-danger{background:rgba(224,92,92,.15);color:#E05C5C;border:1.5px solid rgba(224,92,92,.3);}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);padding:10px 22px;border-radius:99px;font-size:13px;font-weight:700;white-space:nowrap;z-index:999;animation:toastPop .25s ease;pointer-events:none;}
.pill{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700;}
.task-row{border-radius:16px;padding:13px 15px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start;cursor:pointer;position:relative;overflow:hidden;}
.checkbox{width:24px;height:24px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.note-card{border-radius:18px;padding:14px 16px;margin-bottom:10px;cursor:pointer;border:1px solid rgba(255,255,255,.08);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sec-title{font-size:11px;font-weight:800;color:#7A849A;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;}
.welcome{position:fixed;top:0;left:0;right:0;z-index:500;padding:54px 24px 24px;animation:slideDown .5s ease;box-shadow:0 8px 32px rgba(0,0,0,.4);background:linear-gradient(135deg,#3A7BD5,#5E5CE6);}
select option{background:#161B25;color:#EEF0F6;}
</style>
</head>

const $ = id => document.getElementById(id);
const uid = () => Math.random().toString(36).slice(2,10);
const pad = n => String(n).padStart(2,'0');
const fmtTime = iso => { if(!iso)return''; const d=new Date(iso); return pad(d.getHours())+':'+pad(d.getMinutes()); };
const fmtDate = iso => { if(!iso)return''; const d=new Date(iso); return pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear(); };
const fmtFull = iso => iso ? fmtDate(iso)+' '+fmtTime(iso) : '';
const isToday = iso => iso && new Date(iso).toDateString()===new Date().toDateString();
const isPast  = iso => !!(iso && new Date(iso)<new Date());
const isSoon  = iso => { if(!iso)return false; const d=new Date(iso)-new Date(); return d>0&&d<7200000; };
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const LS = {
  get:(k,d)=>{ try{ const v=localStorage.getItem(k); return v!=null?JSON.parse(v):d; }catch(e){return d;} },
  set:(k,v)=>{ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
};

// ═══════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════
function toast(msg, type='ok'){
  const c=C(), id='t'+uid();
  const bg = type==='err'?c.red : type==='warn'?c.warn : c.card;
  const el = document.createElement('div');
  el.className='toast';
  el.id=id;
  el.style.cssText=`background:${bg};color:#fff;box-shadow:0 4px 20px rgba(0,0,0,.35);`;
  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 2600);
}

// ═══════════════════════════════════════
//  DEADLINE TIMERS
// ═══════════════════════════════════════
const timers = {};
function scheduleReminders(){
  S.tasks.forEach(t=>{
    if(t.done||!t.dueDate||timers[t.id])return;
    const diff = new Date(t.dueDate)-new Date();
    if(diff>0&&diff<86400000){
      timers[t.id]=setTimeout(()=>toast('⏰ '+t.title,'warn'), Math.max(0,diff-600000));
    }
  });
}

      const tf=S.taskForm, isEdit=!!tf.id;
      body=`
        <div style="font-weight:800;font-size:20px;margin-bottom:18px;color:${c.text}">${isEdit?t.editTask:t.addTask}</div>
        <label class="label">${t.taskNameLbl}</label>
        <input class="input ${isDark?'':'light'}" id="tf_title" type="text" placeholder="${esc(t.taskNamePh)}" value="${esc(tf.title)}" style="margin-bottom:14px"/>
        <label class="label">${t.descLbl}</label>
        <textarea class="input ${isDark?'':'light'}" id="tf_desc" rows="3" placeholder="${esc(t.descPh)}" style="margin-bottom:14px;line-height:1.6">${esc(tf.desc)}</textarea>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
          <div>
            <label class="label">${t.priorityLbl}</label>
            <select class="input ${isDark?'':'light'}" id="tf_prio">
              ${VI_PRIOS.map((p,i)=>`<option value="${p}" ${tf.priority===p?'selected':''}>${esc(t.prios[i])}</option>`).join('')}
            </select>
          </div>
          <div>
            <label class="label">${t.tagLbl}</label>
            <select class="input ${isDark?'':'light'}" id="tf_tag">
              ${VI_TAGS.map((tg,i)=>`<option value="${tg}" ${tf.tag===tg?'selected':''}>${esc(t.tags[i])}</option>`).join('')}
            </select>
          </div>
        </div>
        <label class="label">${t.deadlineLbl}</label>
        <input class="input ${isDark?'':'light'}" id="tf_due" type="datetime-local" value="${esc(tf.dueDate)}" style="margin-bottom:20px"/>
        <button class="btn btn-primary" id="btnSaveTask">${isEdit?t.saveBtn:t.createBtn}</button>
        ${isEdit?`<button class="btn btn-danger" id="btnDeleteTask">${t.deleteTask}</button>`:''}
        <button class="btn btn-ghost" id="btnCancelModal">${t.cancelBtn}</button>`;
    }
    else if(S.modal==='taskDetail'){
      const task=S.selTask;
      const ov=isPast(task.dueDate)&&!isToday(task.dueDate)&&!task.done;
      const pi=VI_PRIOS.indexOf(task.priority); const ppi=pi>=0?pi:1;
      const pc=PRIO_COLORS[ppi];
      body=`
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
          <div style="flex:1">
            <div style="font-weight:800;font-size:20px;line-height:1.3;color:${task.done?c.sub:c.text};text-decoration:${task.done?'line-through':'none'}">${esc(task.title)}</div>
            <div style="margin-top:8px">${pill(pc,t.prioIcons[ppi]+' '+(t.prios[ppi]||task.priority))}</div>
          </div>
          <button id="btnPin" style="background:transparent;border:1.5px solid ${task.pinned?c.gold:bdr};border-radius:10px;padding:6px 12px;color:${task.pinned?c.gold:c.sub};font-family:inherit;font-size:12px;font-weight:700">${task.pinned?t.pinnedBtn:t.pinBtn}</button>
        </div>
        ${task.desc?`<div class="card ${isDark?'':'light'}" style="background:${c.card2};margin-bottom:14px"><div style="font-size:14px;line-height:1.6;color:${c.sub};white-space:pre-wrap">${esc(task.desc)}</div></div>`:''}
        <div class="card ${isDark?'':'light'}" style="background:${c.card2};margin-bottom:18px">
          <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid ${bdr};font-size:14px">
            <span style="color:${c.sub};font-weight:600">${t.deadlineInfo}</span>
            <span style="font-weight:700;color:${ov?c.red:c.text};text-align:right">${task.dueDate?(ov?t.overdueTxt+' — ':'')+fmtFull(task.dueDate):'—'}</span>
          </div>
          <div style="display:flex;justify-content:space-between;padding:8px 0;font-size:14px">
            <span style="color:${c.sub};font-weight:600">${t.createdInfo}</span>
            <span style="font-weight:700">${fmtFull(task.createdAt)}</span>
          </div>
        </div>
        <button class="btn ${task.done?'btn-ghost':'btn-primary'}" id="btnToggleTaskDone">${task.done?t.unmarkDone:t.markDone}</button>
        <button class="btn btn-ghost" id="btnEditTaskFromDetail">${t.editBtn}</button>
        <button class="btn btn-danger" id="btnDeleteTaskDetail">🗑 ${t.cancelBtn==='Huỷ'?'Xoá':'Delete'}</button>`;
    }
    else if(S.modal==='noteForm'){
      const nf=S.noteForm, isNew=!nf.id;
      body=`
        <div style="font-weight:800;font-size:20px;margin-bottom:18px">${isNew?t.newNote:t.editNote}</div>
        <label class="label" style="color:rgba(255,255,255,.5)">${t.noteTitleLbl}</label>
        <input id="nf_title" type="text" placeholder="${esc(t.noteTitlePh)}" value="${esc(nf.title)}" style="width:100%;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.15);border-radius:12px;padding:12px 14px;color:#fff;outline:none;margin-bottom:14px"/>
        <label class="label" style="color:rgba(255,255,255,.5)">${t.noteBodyLbl}</label>
        <textarea id="nf_body" rows="8" placeholder="${esc(t.noteBodyPh)}" style="width:100%;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.15);border-radius:12px;padding:12px 14px;color:#fff;outline:none;margin-bottom:14px;line-height:1.6;font-size:14px;font-family:inherit">${esc(nf.body)}</textarea>
        <label class="label" style="color:rgba(255,255,255,.5)">${t.noteColorLbl}</label>
        <div style="display:flex;gap:10px;margin-bottom:20px">
          ${NOTE_COLORS.map(nc=>`<div data-nc="${nc}" style="width:32px;height:32px;border-radius:10px;background:${nc};cursor:pointer;border:3px solid ${nf.color===nc?c.gold:'transparent'}"></div>`).join('')}
        </div>
        <button class="btn btn-primary" id="btnSaveNote">${isNew?t.createNote:t.saveNote}</button>
        ${!isNew?`<button class="btn btn-danger" id="btnDeleteNote">${t.deleteNote}</button>`:''}
        <button class="btn btn-ghost" id="btnCancelModal">${t.cancelBtn}</button>`;
    }
    else if(S.showSett){
      body=`
        <div style="font-weight:800;font-size:20px;margin-bottom:20px;color:${c.text}">${t.settings}</div>
        <label class="label">${t.themeLabel}</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
          ${['dark','light'].map(th=>`<button data-settheme="${th}" style="background:${S.theme===th?c.gold:'transparent'};color:${S.theme===th?'#000':c.sub};border:1.5px solid ${S.theme===th?c.gold:bdr};border-radius:14px;padding:12px;font-size:14px;font-weight:700;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px">
            ${th==='dark'?ic('moon'):ic('sun')} ${th==='dark'?t.darkLabel:t.lightLabel}
          </button>`).join('')}
        </div>
        <label class="label">${t.langLabel}</label>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:24px">
          ${[['vi','🇻🇳 Việt'],['en','🇬🇧 EN'],['ko','🇰🇷 한국어']].map(([code,label])=>`<button data-setlang="${code}" style="background:${S.lang===code?c.blue+'22':'transparent'};color:${S.lang===code?c.blue:c.sub};border:1.5px solid ${S.lang===code?c.blue:bdr};border-radius:14px;padding:11px 6px;font-size:12px;font-weight:700;font-family:inherit">${label}</button>`).join('')}
        </div>
        <div class="card ${isDark?'':'light'}" style="background:${c.card2}">
          <div style="font-size:13px;font-weight:700;color:${c.text};margin-bottom:12px">${t.backupTitle}</div>
          <div style="font-size:12px;color:${c.sub};margin-bottom:14px">🔒 ${t.storageInfo}</div>
          <button class="btn btn-ghost" id="btnExport" style="margin-bottom:8px">${t.exportBtn}</button>
          <button class="btn btn-ghost" id="btnImportTrigger" style="margin-bottom:0">${t.importBtn}</button>
          <input type="file" id="importFile" accept=".json" style="display:none"/>
        </div>
        <div style="background:${c.blue}22;border:1px solid ${c.blue}44;border-radius:14px;padding:12px 14px;margin-top:10px">
          <div style="font-size:12px;color:${c.blue};font-weight:600">${t.addToHome}</div>
        </div>
        <button class="btn btn-ghost" id="btnCancelModal" style="margin-top:10px">${t.cancelBtn}</button>`;
    }

    const sheetBg = S.modal==='noteForm' ? (S.noteForm.color||bg) : bg;
    modalHTML=`<div class="overlay" id="overlay">
      <div class="sheet ${isDark&&S.modal!=='noteForm'?'':'light'}" style="background:${sheetBg};border-color:${bdr}">
        <div class="handle" style="background:${S.modal==='noteForm'?'rgba(255,255,255,.2)':bdr}"></div>
        <div class="sheet-body">${body}</div>
      </div>
    </div>`;
  }

  // ── assemble ──
  document.getElementById('app').innerHTML = statusHTML + `<div class="screen">${content}</div>` + navHTML + fabHTML + modalHTML;

  // ── bind events ──
  bindEvents();
}

function bindEvents(){
  const c=C(), t=T();

  // nav
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.addEventListener('click',()=>{ S.screen=el.dataset.nav; S.calSelDay=null; render(); });
  });

  // fab
  const fab=document.getElementById('fab');
  if(fab) fab.addEventListener('click',()=>{
    if(S.screen==='notes'){ S.noteForm={id:null,title:'',body:'',color:'#1E3A5F'}; S.modal='noteForm'; }
    else { S.taskForm={id:null,title:'',desc:'',priority:'Quan trọng',tag:'Cá nhân',dueDate:''}; S.modal='taskForm'; }
    render();
  });

  // settings btn
  document.querySelectorAll('#btnSett').forEach(el=>el.addEventListener('click',()=>{ S.showSett=true; render(); }));

  // go notes
  const gn=document.getElementById('goNotes');
  if(gn) gn.addEventListener('click',()=>{ S.screen='notes'; render(); });

  // task rows
  document.querySelectorAll('.task-row').forEach(el=>{
    el.addEventListener('click',e=>{
      if(e.target.closest('[data-check]'))return;
      const id=el.dataset.id;
      S.selTask=S.tasks.find(x=>x.id===id);
      if(S.selTask){ S.modal='taskDetail'; render(); }
    });
  });
  document.querySelectorAll('[data-check]').forEach(el=>{
    el.addEventListener('click',e=>{ e.stopPropagation();
      const id=el.dataset.check;
      const task=S.tasks.find(x=>x.id===id);
      S.tasks=S.tasks.map(x=>x.id===id?{...x,done:!x.done}:x);
      save(); toast(task&&task.done?'↩️':'✅'); render();
    });
  });

  // note cards
  document.querySelectorAll('[data-nid]').forEach(el=>{
    el.addEventListener('click',()=>{
      const n=S.notes.find(x=>x.id===el.dataset.nid);
      if(n){ S.noteForm={...n}; S.modal='noteForm'; render(); }
    });
  });

  // tag filter
  document.querySelectorAll('[data-filter]').forEach(el=>{
    el.addEventListener('click',()=>{ S.filterTag=el.dataset.filter==='__all__'?null:el.dataset.filter; render(); });
  });

  // toggle done
  const td=document.getElementById('btnToggleDone');
  if(td) td.addEventListener('click',()=>{ S.showDone=!S.showDone; render(); });

  // calendar
  const cp=document.getElementById('calPrev');
  if(cp) cp.addEventListener('click',()=>{ S.calDate=new Date(S.calDate.getFullYear(),S.calDate.getMonth()-1,1); S.calSelDay=null; render(); });
  const cn=document.getElementById('calNext');
  if(cn) cn.addEventListener('click',()=>{ S.calDate=new Date(S.calDate.getFullYear(),S.calDate.getMonth()+1,1); S.calSelDay=null; render(); });
  document.querySelectorAll('[data-day]').forEach(el=>{
    el.addEventListener('click',()=>{ const d=parseInt(el.dataset.day); S.calSelDay=S.calSelDay===d?null:d; render(); });
  });

  // overlay close
  const ov=document.getElementById('overlay');
  if(ov) ov.addEventListener('click',e=>{ if(e.target===ov){ S.modal=null; S.showSett=false; render(); } });

  // cancel modal
  document.querySelectorAll('#btnCancelModal').forEach(el=>el.addEventListener('click',()=>{ S.modal=null; S.showSett=false; render(); }));

  // task form save
  const bst=document.getElementById('btnSaveTask');
  if(bst) bst.addEventListener('click',()=>{
    const title=document.getElementById('tf_title').value.trim();
    if(!title)return;
    const tf=S.taskForm;
    const updated={...tf,title,desc:document.getElementById('tf_desc').value,priority:document.getElementById('tf_prio').value,tag:document.getElementById('tf_tag').value,dueDate:document.getElementById('tf_due').value};
    if(tf.id){ S.tasks=S.tasks.map(x=>x.id===tf.id?updated:x); }
    else { S.tasks=[{...updated,id:uid(),done:false,createdAt:new Date().toISOString()},...S.tasks]; }
    save(); scheduleReminders(); S.modal=null; toast('✓'); render();
  });

  // task form delete
  const bdt=document.getElementById('btnDeleteTask');
  if(bdt) bdt.addEventListener('click',()=>{ S.tasks=S.tasks.filter(x=>x.id!==S.taskForm.id); save(); S.modal=null; toast('🗑','err'); render(); });

  // task detail buttons
  const bttd=document.getElementById('btnToggleTaskDone');
  if(bttd) bttd.addEventListener('click',()=>{
    S.tasks=S.tasks.map(x=>x.id===S.selTask.id?{...x,done:!x.done}:x);
    S.selTask={...S.selTask,done:!S.selTask.done};
    save(); toast(S.selTask.done?'✅':'↩️'); render();
  });
  const betd=document.getElementById('btnEditTaskFromDetail');
  if(betd) betd.addEventListener('click',()=>{ S.taskForm={...S.selTask}; S.modal='taskForm'; render(); });
  const bdetd=document.getElementById('btnDeleteTaskDetail');
  if(bdetd) bdetd.addEventListener('click',()=>{ S.tasks=S.tasks.filter(x=>x.id!==S.selTask.id); save(); S.modal=null; toast('🗑','err'); render(); });
  const bpin=document.getElementById('btnPin');
  if(bpin) bpin.addEventListener('click',()=>{
    S.tasks=S.tasks.map(x=>x.id===S.selTask.id?{...x,pinned:!x.pinned}:x);
    S.selTask={...S.selTask,pinned:!S.selTask.pinned};
    save(); render();
  });

  // note form save
  const bsn=document.getElementById('btnSaveNote');
  if(bsn) bsn.addEventListener('click',()=>{
    const title=document.getElementById('nf_title').value.trim();
    if(!title)return;
    const nf=S.noteForm, now=new Date().toISOString();
    const updated={...nf,title,body:document.getElementById('nf_body').value};
    if(nf.id){ S.notes=S.notes.map(x=>x.id===nf.id?{...updated,updatedAt:now}:x); }
    else { S.notes=[{...updated,id:uid(),createdAt:now,updatedAt:now},...S.notes]; }
    save(); S.modal=null; toast('✓'); render();
  });

  // note form delete
  const bdn=document.getElementById('btnDeleteNote');
  if(bdn) bdn.addEventListener('click',()=>{ S.notes=S.notes.filter(x=>x.id!==S.noteForm.id); save(); S.modal=null; toast('🗑','err'); render(); });

  // note color picker
  document.querySelectorAll('[data-nc]').forEach(el=>{
    el.addEventListener('click',()=>{ S.noteForm={...S.noteForm,color:el.dataset.nc}; render(); });
  });

  // settings: theme
  document.querySelectorAll('[data-settheme]').forEach(el=>{
    el.addEventListener('click',()=>{ S.theme=el.dataset.settheme; LS.set('dm_theme',S.theme); render(); });
  });

  // settings: lang
  document.querySelectorAll('[data-setlang]').forEach(el=>{
    el.addEventListener('click',()=>{ S.lang=el.dataset.setlang; LS.set('dm_lang',S.lang); render(); });
  });

  // export
  const bexp=document.getElementById('btnExport');
  if(bexp) bexp.addEventListener('click',()=>{
    const data={tasks:S.tasks,notes:S.notes,exportedAt:new Date().toISOString(),version:'1.0'};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download='DailyBackup_'+fmtDate(new Date().toISOString()).replace(/\//g,'-')+'.json';
    a.click(); URL.revokeObjectURL(url);
    toast(T().exportOk);
  });

  // import
  const bimp=document.getElementById('btnImportTrigger');
  if(bimp) bimp.addEventListener('click',()=>document.getElementById('importFile').click());
  const impFile=document.getElementById('importFile');
  if(impFile) impFile.addEventListener('change',e=>{
    const file=e.target.files[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{ try{
      const d=JSON.parse(ev.target.result);
      if(d.tasks&&d.notes){ S.tasks=d.tasks; S.notes=d.notes; save(); toast(T().importOk); render(); }
      else toast(T().importErr,'err');
    }catch(err){ toast(T().importErr,'err'); } };
    reader.readAsText(file); e.target.value='';
  });
}

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
scheduleReminders();
render();

// Welcome banner (disappears after 3s)
setTimeout(()=>{
  const w=document.createElement('div');
  w.className='welcome';
  w.innerHTML=`<div style="font-size:28px">👋</div>
    <div style="font-size:22px;font-weight:800;color:#fff;margin-top:6px">Xin chào, ${USER}!</div>
    <div style="font-size:14px;color:rgba(255,255,255,.7);margin-top:4px">Daily Management · Chào mừng trở lại</div>`;
  document.body.appendChild(w);
  setTimeout(()=>{ w.style.transition='opacity .5s'; w.style.opacity='0'; setTimeout(()=>w.remove(),500); }, 2500);
},100);

// Clock update every minute
setInterval(render, 60000);
</script>
</body>
</html>
